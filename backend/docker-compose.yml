services:
    nginx:
        image: nginx:latest
        ports:
            - "80:80"
        volumes:
            - ./nginx.conf:/etc/nginx/nginx.conf
            - ./app:/app
    php:
        build:
            context: .
            dockerfile: PHP.Dockerfile
        volumes:
            - ./app:/app
    mysql:
        image: mariadb:latest
        environment:
            MYSQL_ROOT_PASSWORD: 'rootpass'
            MYSQL_USER: 'dbmanager'
            MYSQL_PASSWORD: 'dbpassword'
            MYSQL_DATABASE: 'CircuTrade'
        volumes:
            - mysqldata:/var/lib/mysql
            - ./app/src/Data/init.sql:/docker-entrypoint-initdb.d/init.sql
        ports:
            - 3306:3306
    phpmyadmin:
        image: phpmyadmin:latest
        ports:
            - 8080:80
        environment:
            - PMA_HOST=mysql
volumes:
    mysqldata: {}